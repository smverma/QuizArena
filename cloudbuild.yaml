steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '--build-arg', 'VITE_API_URL=${_API_URL}',
        '-t',
        '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA',
        '.',
      ]

  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'push',
        '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA',
      ]

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      [
        'run',
        'deploy',
        '${_SERVICE}',
        '--image',
        '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA',
        '--region',
        '${_REGION}',
        '--platform',
        'managed',
        '--allow-unauthenticated',
        '--port',
        '8080',
        # Pass GCP_PROJECT_ID explicitly so the Firestore client never has to
        # rely solely on metadata-server inference, which can fail on cold starts
        # and produces an opaque "5 NOT_FOUND" gRPC error.
        '--set-env-vars',
        'GCP_PROJECT_ID=$PROJECT_ID,FIRESTORE_DATABASE_ID=${_FIRESTORE_DATABASE_ID},ALLOWED_ORIGINS=${_ALLOWED_ORIGINS}',
      ]

substitutions:
  _REGION: us-central1
  _AR_REPO: quizarena
  _SERVICE: quizarena
  # Set _API_URL to your backend Cloud Run URL when triggering this build.
  # Example: https://quizarena-api-abc123-uc.a.run.app
  # Without this the frontend will fall back to http://localhost:3001 (dev only).
  _API_URL: ''
  # Firestore database ID for the named database created in this project.
  _FIRESTORE_DATABASE_ID: 'quiz-free-tier'
  # Comma-separated list of allowed CORS origins (frontend URL).
  # Example: https://quizarena-abc123-uc.a.run.app
  _ALLOWED_ORIGINS: ''

options:
  logging: CLOUD_LOGGING_ONLY
