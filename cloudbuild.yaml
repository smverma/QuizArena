steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '--build-arg', 'VITE_API_URL=${_API_URL}',
        '-t',
        '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA',
        '.',
      ]

  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'push',
        '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA',
      ]

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      [
        'run',
        'deploy',
        '${_SERVICE}',
        '--image',
        '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA',
        '--region',
        '${_REGION}',
        '--platform',
        'managed',
        '--allow-unauthenticated',
        '--port',
        '8080',
      ]

substitutions:
  _REGION: us-central1
  _AR_REPO: quizarena
  _SERVICE: quizarena
  # Set _API_URL to your backend Cloud Run URL when triggering this build.
  # Example: https://quizarena-api-abc123-uc.a.run.app
  # Without this the frontend will fall back to http://localhost:3001 (dev only).
  _API_URL: ''

options:
  logging: CLOUD_LOGGING_ONLY
